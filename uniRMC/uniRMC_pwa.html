<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Universal RMC</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script>
if (typeof mqtt === "undefined") {
  document.write('<script src="https://cdn.jsdelivr.net/npm/mqtt/dist/mqtt.min.js"><\/script>');
}
</script>

<style>
  :root { --pad: 12px; }

  html, body{
    -webkit-user-select:none;
    user-select:none;
    -webkit-touch-callout:none;
    -webkit-tap-highlight-color: transparent;
  }

  body{
    margin:0;
    font-family: system-ui,-apple-system,Segoe UI,Roboto,Apple SD Gothic Neo,sans-serif;
    background:#0b0f14;
    color:#e6eef8;
    padding-top: calc(env(safe-area-inset-top) + 12px);
    overscroll-behavior: contain;
  }

  header{
    position:sticky;
    top:0;
    z-index:10;
    background:rgba(11,15,20,.92);
    backdrop-filter: blur(8px);
    padding: var(--pad);
    border-bottom:1px solid rgba(255,255,255,.08);
  }

  .row{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; }

  .pill{
    padding:6px 10px;
    border-radius:999px;
    font-size:12px;
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.10);
    box-shadow: 0 10px 22px rgba(0,0,0,.65), inset 0 1px 0 rgba(255,255,255,.18), inset 0 -4px 10px rgba(0,0,0,.35);
  }

  .ok{ background:rgba(52,211,153,.15); border-color:rgba(52,211,153,.35); }
  .bad{ background:rgba(248,113,113,.15); border-color:rgba(248,113,113,.35); }

  .pill.ok, .pill.good{
    background: linear-gradient(180deg,#1f262f,#151a21);
    border:1px solid rgba(34,197,94,.85);
    box-shadow:
      0 0 0 1px rgba(34,197,94,.35),
      0 0 18px rgba(34,197,94,.22),
      0 12px 26px rgba(0,0,0,.65),
      inset 0 1px 0 rgba(255,255,255,.14),
      inset 0 -6px 14px rgba(0,0,0,.40);
    color:#eafff1;
    text-shadow:0 1px 0 rgba(0,0,0,.55);
  }

  .pill.bad{
    background: linear-gradient(180deg,#2a313b,#1a2028);
    color:#e6eef8;
    border:1px solid rgba(255,255,255,.10);
  }

  main{
    padding: var(--pad);
    display:grid;
    gap:4px;
  }

  section{
    position: relative;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,.14);
    background: radial-gradient(1200px 420px at 18% 0%, rgba(255,255,255,.10), rgba(255,255,255,.05) 38%, rgba(0,0,0,.08) 100%);
    box-shadow: 0 26px 60px rgba(0,0,0,.78), inset 0 1px 0 rgba(255,255,255,.10), inset 0 -14px 28px rgba(0,0,0,.22);
    padding:12px;
  }

  section:nth-of-type(1){ background: linear-gradient(180deg, rgba(59,130,246,.18), rgba(59,130,246,.10)); }
  section:nth-of-type(2){ background: linear-gradient(180deg, rgba(34,197,94,.18), rgba(34,197,94,.10)); }
  section:nth-of-type(3){ background: linear-gradient(180deg, rgba(168,85,247,.18), rgba(168,85,247,.10)); }
  section:nth-of-type(4){
    background: rgba(255,255,255,.07);
    padding:6px 10px;
  }

  section:nth-of-type(4) h2{
    margin:0;
  }

  h2{
    margin:0 0 10px;
    font-size:14px;
    opacity:1;
    color: rgba(220,220,220,.96);
    text-shadow: 0 1px 0 rgba(255,255,255,.14), 0 10px 22px rgba(0,0,0,.65);
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
  }

  .grid{ display:grid; grid-template-columns: repeat(3,1fr); gap:10px; }
  .grid2{ display:grid; grid-template-columns: 1fr 1fr; gap:10px; }

  button{
    width:100%;
    padding:14px 10px;
    border-radius:16px;
    border:1px solid rgba(255,255,255,.20);
    background:linear-gradient(180deg, rgba(255,255,255,.16), rgba(255,255,255,.08));
    color:#f6fbff;
    font-size:14px;
    font-weight:600;
    text-shadow:0 1px 0 rgba(0,0,0,.55);
    box-shadow: 0 16px 34px rgba(0,0,0,.62), 0 6px 14px rgba(0,0,0,.38), inset 0 1px 0 rgba(255,255,255,.28), inset 0 -12px 20px rgba(0,0,0,.35);
    transition:transform .08s ease, filter .08s ease, box-shadow .12s ease, border-color .12s ease;
    touch-action:manipulation;
    -webkit-user-select:none;
    user-select:none;
    -webkit-touch-callout:none;
    -webkit-tap-highlight-color: transparent;
  }

  main > section:nth-of-type(1) button:not(.logbtn){
    background: linear-gradient(180deg, rgba(59,130,246,.28), rgba(59,130,246,.12));
    border-color: rgba(59,130,246,.34);
    box-shadow: 0 18px 38px rgba(0,0,0,.64), 0 10px 22px rgba(59,130,246,.10), inset 0 1px 0 rgba(255,255,255,.26), inset 0 -12px 22px rgba(0,0,0,.36);
  }

  main > section:nth-of-type(2) button:not(.logbtn){
    background: linear-gradient(180deg, rgba(34,197,94,.26), rgba(34,197,94,.10));
    border-color: rgba(34,197,94,.32);
    box-shadow: 0 18px 38px rgba(0,0,0,.64), 0 10px 22px rgba(34,197,94,.10), inset 0 1px 0 rgba(255,255,255,.26), inset 0 -12px 22px rgba(0,0,0,.36);
  }

  main > section:nth-of-type(3) button:not(.logbtn){
    background: linear-gradient(180deg, rgba(168,85,247,.26), rgba(168,85,247,.10));
    border-color: rgba(168,85,247,.32);
    box-shadow: 0 18px 38px rgba(0,0,0,.64), 0 10px 22px rgba(168,85,247,.10), inset 0 1px 0 rgba(255,255,255,.26), inset 0 -12px 22px rgba(0,0,0,.36);
  }

  button:active, .logbtn:active, .dir-pad:active{
    transform: translateY(3px) scale(0.985);
    filter: brightness(0.92) saturate(1.05);
  }

  .pressed{
    transform: translateY(3px) scale(0.985);
    filter: brightness(0.92) saturate(1.05);
    box-shadow: 0 10px 22px rgba(0,0,0,.55), inset 0 8px 18px rgba(0,0,0,.58), inset 0 1px 0 rgba(255,255,255,.12) !important;
  }


  body.holding-dir,
  body.holding-dir *,
  body.holding-dir *::before,
  body.holding-dir *::after{
    -webkit-user-select:none !important;
    user-select:none !important;
    -webkit-touch-callout:none !important;
    -webkit-user-drag:none !important;
    touch-action:none !important;
  }

  #press-shield{
    position:fixed;
    inset:0;
    z-index:2147483646;
    background:transparent;
    pointer-events:auto;
    touch-action:none;
    -webkit-user-select:none;
    user-select:none;
    -webkit-touch-callout:none;
    -webkit-user-drag:none;
  }

  html, body, button, .iconbtn, .logbtn, .dir-pad, .dir-pad::before{
    -webkit-touch-callout:none !important;
    -webkit-user-select:none !important;
    user-select:none !important;
  }

  .wide{ grid-column: span 3; }

  .log{
    max-height:170px;
    overflow:auto;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size:12px;
    line-height:1.35;
    padding:10px;
    background:rgba(0,0,0,.30);
    border-radius:12px;
    border:1px solid rgba(255,255,255,.10);
  }

  .status-row{ display:flex; flex-wrap:nowrap; gap:8px; align-items:center; }
  .status-row .pill{
    padding:6px 10px;
    font-size:13px;
    white-space:nowrap;
    text-align:center;
    flex:0 0 auto;
  }

  .brand-title{
    color: rgba(225,225,225,.96) !important;
    text-shadow: 0 1px 0 rgba(255,255,255,.16), 0 12px 26px rgba(0,0,0,.70) !important;
    font-weight:800;
    letter-spacing:.2px;
    font-size:24px;
  }

  #clock{ line-height:1; padding:6px 10px; }

  #st-rssi{
    border:1px solid rgba(59,130,246,.85);
    box-shadow: 0 0 0 1px rgba(59,130,246,.30), 0 0 16px rgba(59,130,246,.18), 0 10px 22px rgba(0,0,0,.60), inset 0 1px 0 rgba(255,255,255,.14), inset 0 -6px 14px rgba(0,0,0,.40);
  }

  .logbtn{
    border-color: rgba(255,255,255,.22);
    background: linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.06));
    box-shadow: 0 18px 36px rgba(0,0,0,.72), inset 0 1px 0 rgba(255,255,255,.18), inset 0 -10px 18px rgba(0,0,0,.42);
  }

  .logbtn-left{ width:54px; padding:6px 0; text-align:center; font-size:14px; line-height:1; }
  .logbtn-right{ width:110px; padding:6px 0; text-align:center; font-size:12px; line-height:1; letter-spacing:.3px; }

  .iconbtn{
    width:34px; height:34px; padding:0; border-radius:999px; display:inline-flex; align-items:center; justify-content:center;
    border:1px solid rgba(255,255,255,.18); background:rgba(255,255,255,.10); color:#fff; font-size:16px; line-height:1;
    box-shadow: 0 12px 22px rgba(0,0,0,.55), inset 0 1px 0 rgba(255,255,255,.16);
  }
  .iconbtn:active{ transform: translateY(2px) scale(0.985); filter: brightness(0.92); }

  /* 모바일 전용 방향키 패드: button 대신 div */
  .dir-pad{
    min-height:46px;
    border-radius:16px;
    border:1px solid rgba(255,255,255,.20);
    background:linear-gradient(180deg, rgba(255,255,255,.16), rgba(255,255,255,.08));
    color:#f6fbff;
    box-shadow: 0 16px 34px rgba(0,0,0,.62), 0 6px 14px rgba(0,0,0,.38), inset 0 1px 0 rgba(255,255,255,.28), inset 0 -12px 20px rgba(0,0,0,.35);
    position:relative;
    touch-action:none !important;
    -webkit-user-select:none !important;
    user-select:none !important;
    -webkit-touch-callout:none !important;
    -webkit-tap-highlight-color:transparent !important;
    -webkit-touch-action:none !important;
    overflow:hidden;
  }

  main > section:nth-of-type(1) .dir-pad{
    background: linear-gradient(180deg, rgba(59,130,246,.28), rgba(59,130,246,.12));
    border-color: rgba(59,130,246,.34);
    box-shadow: 0 18px 38px rgba(0,0,0,.64), 0 10px 22px rgba(59,130,246,.10), inset 0 1px 0 rgba(255,255,255,.26), inset 0 -12px 22px rgba(0,0,0,.36);
  }

  .dir-pad::before{
    content:"";
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    width:0;
    height:0;
    pointer-events:none;
    filter:drop-shadow(0 1px 0 rgba(0,0,0,.45));
  }

  .dir-up::before{
    border-left:10px solid transparent;
    border-right:10px solid transparent;
    border-bottom:14px solid currentColor;
  }
  .dir-down::before{
    border-left:10px solid transparent;
    border-right:10px solid transparent;
    border-top:14px solid currentColor;
  }
  .dir-left::before{
    border-top:10px solid transparent;
    border-bottom:10px solid transparent;
    border-right:14px solid currentColor;
  }
  .dir-right::before{
    border-top:10px solid transparent;
    border-bottom:10px solid transparent;
    border-left:14px solid currentColor;
  }

  body.day{
    background:#f4f6fb;
    color:#0b0f14;
  }

  body.day header{
    background:rgba(244,246,251,.92);
    border-bottom:1px solid rgba(0,0,0,.10);
  }

  body.day .brand-title{
    color: rgba(18,18,18,.92) !important;
    text-shadow: 0 1px 0 rgba(255,255,255,.75), 0 10px 22px rgba(0,0,0,.12) !important;
  }

  body.day .pill{
    background:rgba(0,0,0,.06);
    border:1px solid rgba(0,0,0,.10);
    box-shadow: 0 10px 18px rgba(0,0,0,.12), inset 0 1px 0 rgba(255,255,255,.70);
    color:#0b0f14;
  }

  body.day .pill.ok, body.day .pill.good{
    background: linear-gradient(180deg,#ffffff,#eef3ff);
    border:1px solid rgba(34,197,94,.85);
    box-shadow: 0 0 0 1px rgba(34,197,94,.20), 0 0 14px rgba(34,197,94,.10), 0 10px 18px rgba(0,0,0,.10), inset 0 1px 0 rgba(255,255,255,.85), inset 0 -6px 14px rgba(0,0,0,.06);
    color:#0b0f14;
    text-shadow:none;
  }

  body.day #st-rssi{
    border:1px solid rgba(59,130,246,.85);
    box-shadow: 0 0 0 1px rgba(59,130,246,.22), 0 0 12px rgba(59,130,246,.10), 0 10px 18px rgba(0,0,0,.10), inset 0 1px 0 rgba(255,255,255,.85), inset 0 -6px 14px rgba(0,0,0,.06);
  }

  body.day section{
    border:1px solid rgba(0,0,0,.10);
    background: radial-gradient(1200px 420px at 18% 0%, rgba(0,0,0,.03), rgba(0,0,0,.02) 38%, rgba(255,255,255,.60) 100%);
    box-shadow: 0 18px 42px rgba(0,0,0,.14), inset 0 1px 0 rgba(255,255,255,.85), inset 0 -14px 28px rgba(0,0,0,.06);
  }

  body.day h2{
    color: rgba(20,20,20,.92) !important;
    text-shadow: 0 1px 0 rgba(255,255,255,.70), 0 10px 22px rgba(0,0,0,.10);
  }

  body.day button, body.day .logbtn{
    border:1px solid rgba(0,0,0,.12);
    background: linear-gradient(180deg, rgba(255,255,255,.95), rgba(253,254,255,.94));
    color:#0b0f14;
    text-shadow:none;
    box-shadow: 0 1px 2px rgba(0,0,0,.05), inset 0 1px 0 rgba(255,255,255,.35);
    filter: saturate(0.70);
  }

  body.day .dir-pad{
    border:1px solid rgba(0,0,0,.12);
    background: linear-gradient(180deg, rgba(255,255,255,.95), rgba(253,254,255,.94));
    color:#0b0f14;
    box-shadow: 0 1px 2px rgba(0,0,0,.05), inset 0 1px 0 rgba(255,255,255,.35);
    filter: saturate(0.70);
  }

  body.day button:active, body.day .logbtn:active, body.day .dir-pad:active{
    box-shadow: 0 1px 1px rgba(0,0,0,.05), inset 0 1px 2px rgba(0,0,0,.05), inset 0 1px 0 rgba(255,255,255,.28) !important;
    transform: translateY(1px);
    filter: saturate(0.70) brightness(0.995);
  }

  body.day .log{
    background:rgba(255,255,255,.70);
    border:1px solid rgba(0,0,0,.10);
    color:#0b0f14;
  }

  body.day .iconbtn{
    border:1px solid rgba(0,0,0,.12);
    background:rgba(255,255,255,.75);
    color:#0b0f14;
    box-shadow: 0 10px 18px rgba(0,0,0,.12), inset 0 1px 0 rgba(255,255,255,.85);
  }

  @media (max-width: 480px){
    :root{ --pad: 10px; }
    main{ padding-top:6px; padding-bottom:8px; gap:3px; }
    .status-row{ gap:6px; }
    .status-row .pill{
      padding:5px 7px;
      font-size:12px;
      flex:1 1 0;
      min-width:0;
    }
    #clock{ padding:6px 7px; line-height:1; }
  }
</style>
</head>
<body>
<header>
  <div class="row" style="justify-content:space-between">
    <div class="brand-title">Universal RMC</div>
    <div class="row" style="gap:8px; align-items:center; justify-content:flex-end;">
      <div class="pill" id="clock">--:--</div>
      <button id="themeToggle" class="iconbtn" type="button" aria-label="주/야간 전환" title="주/야간 전환">☀️</button>
    </div>
  </div>
  <div class="row status-row" style="margin-top:6px">
    <div class="pill bad" id="st-mqtt">MQTT: --</div>
    <div class="pill bad" id="st-gw">Gateway: --</div>
    <div class="pill bad" id="st-ble">BLE: --</div>
    <div class="pill" id="st-rssi">RSSI: --</div>
  </div>
</header>

<main>
<section>
  <h2>MiBox RMC</h2>
  <div class="grid">
    <div class="wide dir-pad dir-up" id="btn-up" role="button" tabindex="0" aria-label="위" data-dir="up"></div>
    <div class="dir-pad dir-left" id="btn-left" role="button" tabindex="0" aria-label="왼쪽" data-dir="left"></div>
    <button id="btn-ok" type="button">OK</button>
    <div class="dir-pad dir-right" id="btn-right" role="button" tabindex="0" aria-label="오른쪽" data-dir="right"></div>
    <div class="wide dir-pad dir-down" id="btn-down" role="button" tabindex="0" aria-label="아래" data-dir="down"></div>

    <button id="btn-voldown" type="button">VOL-</button>
    <button id="btn-mute" type="button">MUTE</button>
    <button id="btn-volup" type="button">VOL+</button>
  </div>
  <div style="height:6px"></div>
  <div class="grid2">
    <button id="btn-back" type="button">⟵ BACK</button>
    <button id="btn-home" type="button">HOME</button>
  </div>
</section>

<section>
  <h2>433 RMC</h2>
  <div class="grid2">
    <button onclick="send433('LIGHT')" type="button">LIGHT</button>
    <button onclick="send433('DOOR')" type="button">DOOR</button>
    <button onclick="send433('SPK1')" type="button">SPK1</button>
    <button onclick="send433('SPK2')" type="button">SPK2</button>
  </div>
</section>

<section>
  <h2>IR RMC</h2>
  <div class="grid">
    <button onclick="sendIR('POWER1')" type="button">POWER1</button>
    <button onclick="sendIR('VOL-1')" type="button">VOL-</button>
    <button onclick="sendIR('VOL+1')" type="button">VOL+</button>
    <button onclick="sendIR('POWER2')" type="button">POWER2</button>
    <button onclick="sendIR('VOL-2')" type="button">VOL-</button>
    <button onclick="sendIR('VOL+2')" type="button">VOL+</button>
  </div>
</section>

<section>
  <h2 style="display:flex; align-items:center; justify-content:space-between; gap:12px;">
    <button class="logbtn logbtn-left" id="toggleLog" onclick="toggleLog()" type="button">🪲</button>
    <button class="logbtn logbtn-right" onclick="sendReset()" type="button">RESET</button>
  </h2>
  <div class="log" id="log" style="display:none"></div>
</section>
</main>

<script>
  const TOPIC = {
    miboxCmd: "tswell/mibox3/cmd",
    miboxStatus: "tswell/mibox3/status",
    irCmd: "tswell/ir/cmd",
    irStatus: "tswell/ir/status",
    r433Cmd: "tswell/433home/cmd",
    r433Status: "tswell/433home/status",
    r433Log: "tswell/433home/log",
    myhomeAnnounce: "pspiceman/myhome/announce",
  };

  const HOLD_START_MS = 260;
  const HOLD_REPEAT_MS = 100;
  const GW_STALE_MS = 25000;
  const BLE_STALE_MS = 6000;
  const BLE_UI_OFF_CONFIRM_MS = 4000;

  let client = null;
  let gw = { wifi:null, mqtt:null, rssi:null };
  let gwLastTs = 0;
  let ble = null;
  let bleLastTs = 0;
  let bleOffStart = 0;
  let mqttOk = false;

  const $ = (id)=>document.getElementById(id);
  const logEl = $("log");
  const stMqtt = $("st-mqtt");
  const stGw = $("st-gw");
  const stBle = $("st-ble");
  const stRssi = $("st-rssi");

  function toggleLog(){
    const el = $("log");
    const showing = el.style.display !== "none";
    el.style.display = showing ? "none" : "block";
  }

  function addLog(line){
    if (!logEl) return;
    const ts = new Date().toLocaleTimeString();
    logEl.innerText = `[${ts}] ${line}\n` + logEl.innerText;
  }

  function setPill(el, ok, text){
    if (!el) return;
    el.classList.remove("ok","bad");
    el.classList.add(ok ? "ok":"bad");
    el.innerText = text;
  }

  function connect(){
    if (typeof mqtt === "undefined") {
      setPill(stMqtt, false, "MQTT: LIB ERR");
      addLog("mqtt.min.js load failed");
      return;
    }

    const url = "wss://broker.hivemq.com:8884/mqtt";
    const cid = "web_" + Math.random().toString(16).slice(2);

    client = mqtt.connect(url, {
      clientId: cid,
      clean: true,
      reconnectPeriod: 1500,
      keepalive: 30,
      connectTimeout: 8000
    });

    client.on("connect", ()=>{
      mqttOk = true;
      setPill(stMqtt, true, "MQTT: OK");
      addLog("MQTT connected");

      client.subscribe(Object.values(TOPIC), { qos:0 }, (err)=>{
        if(err) addLog("SUB ERR: " + err.message);
        else addLog("Subscribed topics");
      });
    });

    client.on("reconnect", ()=>{
      mqttOk = false;
      setPill(stMqtt, false, "MQTT: RETRY");
      gwLastTs = 0;
      setPill(stGw, false, "Gateway: --");
      stRssi.innerText = "RSSI: --";
      bleLastTs = 0;
      setPill(stBle, false, "BLE: --");
      addLog("MQTT reconnecting");
    });

    client.on("close", ()=>{
      mqttOk = false;
      setPill(stMqtt, false, "MQTT: CLOSE");
      gwLastTs = 0;
      setPill(stGw, false, "Gateway: --");
      stRssi.innerText = "RSSI: --";
      bleLastTs = 0;
      setPill(stBle, false, "BLE: --");
      addLog("MQTT closed");
    });

    client.on("offline", ()=>{
      mqttOk = false;
      setPill(stMqtt, false, "MQTT: OFF");
      addLog("MQTT offline");
    });

    client.on("error", (e)=>{
      setPill(stMqtt, false, "MQTT: ERR");
      addLog("MQTT ERR: " + (e?.message || e));
    });

    client.on("message", (topic, payload)=>{
      const msg = payload.toString();

      if(topic === TOPIC.r433Status){
        try{
          const j = JSON.parse(msg);
          gw = j;
          gwLastTs = Date.now();
          const ok = (j.wifi===1 && j.mqtt===1);
          setPill(stGw, ok, "Gateway: " + (ok ? "OK":"BAD"));
          stRssi.innerText = "RSSI: " + (j.rssi ?? "--");
        }catch(e){
          addLog("433 status parse fail");
        }
        return;
      }

      if(topic === TOPIC.myhomeAnnounce){
        try{
          const j = JSON.parse(msg);
          gwLastTs = Date.now();
          setPill(stGw, true, "Gateway: OK");
          stRssi.innerText = "RSSI: " + (j.rssi ?? "--");
        }catch(e){
          addLog("announce parse fail");
        }
        return;
      }

      if(topic === TOPIC.miboxStatus){
        try{
          const j = JSON.parse(msg);
          const now = Date.now();

          if(j.ts === 0){
            if(bleLastTs && (now - bleLastTs) <= BLE_STALE_MS){
              return;
            }
            ble = false;
            bleLastTs = 0;
            bleOffStart = 0;
            setPill(stBle, false, "BLE: --");
            return;
          }

          if(j.ts && j.ts > 1700000000){
            const age = now - (j.ts * 1000);
            if(age > BLE_STALE_MS){
              return;
            }
          }

          const cand = !!j.ble;
          bleLastTs = now;

          if(cand){
            bleOffStart = 0;
            ble = true;
            setPill(stBle, true, "BLE: OK");
          }else{
            if(!bleOffStart) bleOffStart = now;
            const offLongEnough = (now - bleOffStart) >= BLE_UI_OFF_CONFIRM_MS;
            if(offLongEnough){
              ble = false;
              setPill(stBle, false, "BLE: OFF");
            }else{
              ble = true;
              setPill(stBle, true, "BLE: OK");
            }
          }
        }catch(e){
          addLog("BLE status parse fail");
        }
        return;
      }

      if(topic === TOPIC.r433Log){
        addLog(msg);
        return;
      }

      if(topic === TOPIC.irStatus){
        addLog("IR: " + msg);
      }
    });
  }

  function disconnect(){
    if(client){
      client.end(true);
      client = null;
      mqttOk = false;
      setPill(stMqtt, false, "MQTT: --");
      gwLastTs = 0;
      setPill(stGw, false, "Gateway: --");
      stRssi.innerText = "RSSI: --";
      bleLastTs = 0;
      setPill(stBle, false, "BLE: --");
      addLog("MQTT disconnected");
    }
  }

  function pub(topic, msg){
    if(!client || !client.connected){
      addLog("Not connected");
      return;
    }
    client.publish(topic, msg, { qos:0, retain:false });
  }

  function sendReset(){
    send433("reset");
    addLog("RESET requested");
  }

  function sendMi(cmd){
    if(!canBleControl()){
      addLog("BLE not connected -> blocked: " + cmd);
      setPill(stBle, false, "BLE: --");
      return;
    }
    pub(TOPIC.miboxCmd, cmd);
    addLog("MiBox cmd: " + cmd);
  }

  function sendIR(cmd){
    const payload = JSON.stringify({ cmd });
    pub(TOPIC.irCmd, payload);
    addLog("IR cmd: " + cmd);
  }

  function send433(cmd){
    pub(TOPIC.r433Cmd, cmd);
    addLog("433 cmd: " + cmd);
  }

  function bindClick(id, cmd){
    const el = $(id);
    if(!el) return;
    el.addEventListener("click", (e) => {
      e.preventDefault();
      sendMi(cmd);
    });
    el.addEventListener("contextmenu", (e) => e.preventDefault(), {passive:false});
    el.addEventListener("selectstart", (e) => e.preventDefault(), {passive:false});
  }


  // 방향키 연속 입력 로직 수정본
  const dirHold = { active: false, el: null, cmd: null, touchId: null, holdTimer: null, repeatTimer: null };

  function stopDirHold(e){
    if(e && e.changedTouches && dirHold.touchId !== null){
      let match = false; for(let t of e.changedTouches) if(t.identifier === dirHold.touchId) match = true;
      if(!match) return;
    }
    clearTimeout(dirHold.holdTimer); clearTimeout(dirHold.repeatTimer);
    if(dirHold.el) dirHold.el.classList.remove("pressed");
    dirHold.active = false; dirHold.el = null; dirHold.cmd = null; dirHold.touchId = null;
    document.body.style.overflow = ""; // 스크롤 잠금 해제
  }

  function startDirHold(el, cmd, meta){
    stopDirHold();
    dirHold.active = true; dirHold.el = el; dirHold.cmd = cmd;
    dirHold.touchId = meta.touchId ?? null;
    el.classList.add("pressed");
    document.body.style.overflow = "hidden"; // 입력 중 스크롤 방지

    sendMi(cmd);
    dirHold.holdTimer = setTimeout(() => {
      if(!dirHold.active) return;
      (function repeat(){
        if(!dirHold.active) return;
        sendMi(cmd);
        dirHold.repeatTimer = setTimeout(repeat, HOLD_REPEAT_MS);
      })();
    }, HOLD_START_MS);
  }

  function installDirPad(id, cmd){
    const el = $(id); if(!el) return;
    
    el.addEventListener("touchstart", (e)=>{
      if(e.cancelable) e.preventDefault();
      startDirHold(el, cmd, { touchId: e.changedTouches[0].identifier });
    }, {passive:false});

    el.addEventListener("mousedown", (e)=>{
      if(e.button !== 0 || (dirHold.active && dirHold.touchId !== null)) return;
      startDirHold(el, cmd, {});
    });
    
    el.oncontextmenu = (e)=>e.preventDefault();
  }

  function installDirectionGuards(){
    document.addEventListener("touchmove", (e)=>{
      if(dirHold.active && e.cancelable) e.preventDefault();
    }, {passive:false});
    document.addEventListener("touchend", stopDirHold);
    document.addEventListener("touchcancel", stopDirHold);
    document.addEventListener("mouseup", stopDirHold);
  }

  setInterval(()=>{
    if(!mqttOk){
      gwLastTs = 0;
      setPill(stGw, false, "Gateway: --");
      stRssi.innerText = "RSSI: --";
      ble = false;
      bleLastTs = 0;
      setPill(stBle, false, "BLE: --");
      return;
    }

    if(!gwLastTs){
      setPill(stGw, false, "Gateway: --");
      stRssi.innerText = "RSSI: --";
    }else{
      const gwStale = (Date.now() - gwLastTs) > GW_STALE_MS;
      if(gwStale){
        gwLastTs = 0;
        setPill(stGw, false, "Gateway: --");
        stRssi.innerText = "RSSI: --";
        ble = false;
        bleLastTs = 0;
        setPill(stBle, false, "BLE: --");
        return;
      }
    }

    if(!bleLastTs){
      setPill(stBle, false, "BLE: --");
      return;
    }

    const bleStale = (Date.now() - bleLastTs) > BLE_STALE_MS;
    if(bleStale){
      ble = false;
      bleLastTs = 0;
      setPill(stBle, false, "BLE: --");
    }
  }, 1000);

  function canBleControl(){
    const fresh = bleLastTs && (Date.now() - bleLastTs) <= BLE_STALE_MS;
    return mqttOk && !!ble && fresh;
  }

  const THEME_KEY = "urmc_theme";
  const themeBtn = document.getElementById("themeToggle");

  function applyTheme(theme){
    const isDay = (theme === "day");
    document.body.classList.toggle("day", isDay);
    if(themeBtn){
      themeBtn.textContent = isDay ? "🌙" : "☀️";
    }
    try{ localStorage.setItem(THEME_KEY, theme); }catch(e){}
  }

  function toggleTheme(){
    const cur = document.body.classList.contains("day") ? "day" : "night";
    applyTheme(cur === "day" ? "night" : "day");
  }

  (function(){
    let saved = "night";
    try{ saved = localStorage.getItem(THEME_KEY) || "night"; }catch(e){}
    if(saved !== "day") saved = "night";
    applyTheme(saved);
  })();

  if(themeBtn){
    themeBtn.addEventListener("click", toggleTheme);
  }

  window.addEventListener("load", ()=>{
    $("clock").innerText = new Date().toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});
    connect();
    installDirectionGuards();

    installDirPad("btn-up", "up");
    installDirPad("btn-down", "down");
    installDirPad("btn-left", "left");
    installDirPad("btn-right", "right");

    bindClick("btn-ok", "ok1");
    bindClick("btn-voldown", "voldown");
    bindClick("btn-mute", "mute");
    bindClick("btn-volup", "volup");
    bindClick("btn-back", "MB:2000");
    bindClick("btn-home", "MB:0080");
  });

  window.addEventListener("beforeunload", ()=>{ try{ disconnect(); }catch(e){} });

  setInterval(()=>{
    $("clock").innerText = new Date().toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});
  }, 1000);
</script>

<script>
  function addPressedFeedback(){
    document.querySelectorAll("button:not(.dir-pad)").forEach(btn=>{
      const down = ()=>btn.classList.add("pressed");
      const up = ()=>btn.classList.remove("pressed");
      btn.addEventListener("mousedown", down);
      btn.addEventListener("mouseup", up);
      btn.addEventListener("mouseleave", up);
      btn.addEventListener("touchstart", down, {passive:true});
      btn.addEventListener("touchend", up, {passive:true});
      btn.addEventListener("touchcancel", up, {passive:true});
      btn.addEventListener("selectstart", (e)=>e.preventDefault(), {passive:false});
      btn.addEventListener("dragstart", (e)=>e.preventDefault(), {passive:false});
      btn.addEventListener("contextmenu", (e)=>e.preventDefault(), {passive:false});
    });
  }
  window.addEventListener("DOMContentLoaded", addPressedFeedback);
</script>
</body>
</html>
